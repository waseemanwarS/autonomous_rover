slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    #map_file_name: test_steve
    # map_start_pose: [0.0, 0.0, 0.0]
    #map_start_at_dock: true

    debug_logging: true

    # throttle_scans raised further: was 3, now 5. Root cause confirmed via
    # logs - "Message Filter dropping message ... discarding message
    # because the queue is full" was repeating every 2-3 seconds for both
    # rviz2 and slam_toolbox. Scans were arriving faster than they could
    # be processed (each requires a TF lookup), backing up the internal
    # MessageFilter queue and causing some scans to be silently discarded
    # before ever being used - this is the actual cause of map misalignment,
    # not bad odometry/TF data (which was independently verified correct).
    throttle_scans: 5
    transform_publish_period: 0.05
    map_update_interval: 8.0
    resolution: 0.05
    min_laser_range: 0.0
    max_laser_range: 10.0
    minimum_time_interval: 1.0

    # transform_timeout raised from 0.3 to 0.5 - gives each scan's TF
    # lookup more time to succeed before being abandoned, reducing the
    # odds of a lookup stalling and contributing to queue backlog.
    transform_timeout: 0.5

    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.5
    minimum_travel_heading: 0.5

    # scan_buffer_size raised from 10 to 30. This is the parameter most
    # directly tied to the MessageFilter queue depth for slam_toolbox's
    # own scan subscriber - a queue of 10 was filling faster than scans
    # could be matched/processed under load. A deeper buffer absorbs
    # short bursts of backlog instead of dropping scans outright.
    scan_buffer_size: 30
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 2.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 15
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure Parameters
    loop_search_space_dimension: 6.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true