### ekf config file ###
ekf_filter_node:
    ros__parameters:
        frequency: 30.0
        two_d_mode: true
        publish_acceleration: false
        publish_tf: true

        map_frame: map
        odom_frame: odom
        base_link_frame: base_footprint
        world_frame: odom

        # Fuse ABSOLUTE POSITION (x, y, yaw) from odom only - NOT velocity.
        # Fusing both position and velocity from the same source caused
        # disagreement during motion (position-derived vs velocity-derived
        # estimates of the same underlying wheel odometry, with slightly
        # different noise characteristics) - stable at rest, jittery moving.
        odom0: odom
        odom0_config: [true,  true,  false,
                       false, false, true,
                       false, false, false,
                       false, false, false,
                       false, false, false]

        # IMU supplies orientation + angular velocity (vyaw) - this is the
        # filter's only velocity-domain correction now, avoiding overlap
        # with odom's position-domain correction.
        imu0: imu
        imu0_config: [false, false, false,
                      true,  true,  true,
                      false, false, false,
                      false, false, true,
                      true,  false, false]

        imu0_differential: false

